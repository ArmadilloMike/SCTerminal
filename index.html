<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solari Co. Terminal Interface</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

</head>
<body>
    <div class="topbar" id="topbar">
        <p>
            SC Terminal Interface
        </p>
        <p>
            Ω-BLACK
        </p>
        <p id="timeElement">
            3/18/2026 20:07
        </p>
    </div>
    <div id="welcome" class="intro">
        <div id="welcomeheader" class="header">
            <p>welcome window</p>
            <p style="cursor: pointer" id="welcomeclose">[X]</p>
        </div>
        <h1>Welcome to the Solari Co. Terminal Interface</h1>
        <h2>Introduction</h2>
        <p>Welcome OMEGA-BLACK</p>
    </div>
    <div id="report" class="intro">
        <div id="reportheader" class="header">
            <p>report creator</p>
            <p style="cursor: pointer" id="reportclose">[X]</p>
        </div>
        <div class="topbuttons">
            <button id="reportSave">Save</button>
            <button id="reportNew">New Report</button>
            <input type="file" id="reportOpenFile" accept=".txt,text/plain" style="display: none">
            <label for="reportOpenFile" class="button-label">Open File</label>
        </div>
        <label for="reportEditor"></label><textarea id="reportEditor"></textarea>
    </div>
    <div class="appgrid">
        <div class="appicon" id="welcomeopen">
            <img  src="solaricologo.png" alt="Solari Co. Logo">
            <p style="cursor: pointer">Welcome</p>
        </div>
        <div class="appicon" id="reportopen">
            <img  src="solaricologo.png" alt="Solari Co. Logo">
            <p style="cursor: pointer">Report</p>
        </div>
    </div>
    <script src="script.js" defer></script>
</body>
</html>
